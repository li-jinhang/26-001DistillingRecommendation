# ==========================================
# KDG Framework Configuration
# ==========================================
embedding_size: 64
feat_embed_dim: 64

# ==========================================
# ALLB / BaseModel 共享结构参数
# ==========================================
n_mm_layers: 1
n_layers: 2
knn_k: 10
mm_image_weight: 0.1
dropout: [0.1]

# ==========================================
# 预训练教师模型
# ==========================================
teacher_models:
  - name: ALLB
    weight_path: ./saved/ALLB-baby-Apr-24-2026-11-52-50.pth
  - name: ALLB
    weight_path: ./saved/ALLB-baby-Apr-24-2026-12-08-48.pth

teacher_strict_load: false

# ==========================================
# 蒸馏与奖励超参数
# ==========================================
temp: [0.7]
alpha: [0.8]
beta: [0.5]
reward_alpha: 0.8
reward_beta: 0.5

# ==========================================
# Policy Gradient 智能体
# ==========================================
agent_hidden_dim: 64
action_std: 0.08
buffer_size: 64
agent_history_batches: 4
agent_loss_weight: 0.2

# ==========================================
# 学习与正则化
# ==========================================
learning_rate: [0.0001]
reg_weight: [0.001]

# ==========================================
# 自动调参项
# ==========================================
hyper_parameters: ["reg_weight", "learning_rate", "temp", "alpha", "beta"]
