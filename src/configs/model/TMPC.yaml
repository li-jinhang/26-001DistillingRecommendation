# ========================================================
# 基础 Embedding 维度 (对应子模型中的 dim_latent)
# ========================================================
embedding_size: 64
feat_embed_dim: 64

# ========================================================
# KNN 物品图构建相关参数 (Item-Item Graph)
# ========================================================
knn_k: 10                  # KNN 图中每个节点的邻居数
mm_image_weight: 0.1       # 融合 V 和 T 邻接矩阵时视觉特征的权重
n_mm_layers: 1             # KNN 图上的传播层数 (对应 buildItemGraph)

# ========================================================
# 基础 GCN 层数 (User-Item Interaction Graph)
# ========================================================
n_layers: 2                # 各模态 GCN 演化的层数

# ========================================================
# 训练相关通用参数
# ========================================================
learning_rate: [0.0001]
reg_weight: [1e-05]        # L2 正则化权重 (包含 ID 偏好和权重参数)
dropout: 0.2               # 丢弃率

# ========================================================
# 内部对齐参数 (各子模型特有)
# ========================================================
# align_weight 在 TMP 中对应高斯分布对齐权重，在 TMPB 中对应 InfoNCE 权重
align_weight: [0.1]
# temp 在 TMPB 中对应对比学习温度系数
temp: [0.2]

# ========================================================
# 在线互学习 (Mutual Learning) 专用参数
# ========================================================
# kd_weight: 控制双模型之间 KL 散度损失的强度
kd_weight: [1.0]

# kd_temp: 知识蒸馏温度。
# 较高的值会产生更平滑的概率分布，使模型能学习到更细微的排名倾向
kd_temp: [1.0]

# ========================================================
# 超参数搜索列表
# ========================================================
hyper_parameters: ["reg_weight", "learning_rate", "align_weight", "temp", "kd_weight", "kd_temp"]