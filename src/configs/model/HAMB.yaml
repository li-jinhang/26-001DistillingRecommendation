
# 基础嵌入维度
embedding_size: 64
feat_embed_dim: 64

# 图与超图构建参数
n_mm_layers: 1
n_layers: 2
knn_k: 10
mm_image_weight: 0.1

# 优化器与正则化配置
learning_rate: [0.0001]
reg_weight: [0.0001]

# Dropout (如适用)
dropout: [0.2]

# 超边一致性建模 (跨模态对齐) 配置
# align_weight 控制 InfoNCE 对齐损失在总 Loss 中的比重
align_weight: [0.1]

# temp 为 InfoNCE 损失中的温度系数，控制对困难负样本的惩罚力度
temp: [0.5]

# 需要进行网格搜索 (Grid Search) 的超参数列表
hyper_parameters: ["reg_weight", "learning_rate", "dropout", "align_weight", "temp"]