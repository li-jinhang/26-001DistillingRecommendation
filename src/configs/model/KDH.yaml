# ==========================================
# 基础特征与嵌入维度
# ==========================================
embedding_size: 64
feat_embed_dim: 64

# ==========================================
# ALLB 架构相关参数 (学生与教师共有)
# ==========================================
n_mm_layers: 1      # 物品跨模态图传播层数 (Item Graph)
n_layers: 2         # 基础 GCN 卷积层数 (User-Item Graph)
knn_k: 10           # 构建多模态 kNN 图的邻居数
mm_image_weight: 0.1 # 图像模态权重 (1-w 为文本权重)

# ==========================================
# 教师模型配置 (强制使用 ALLB 架构进行蒸馏)
# ==========================================
teacher1_model: 'ALLB'
teacher1_weight: 'ALLB-baby-Apr-24-2026-11-52-50.pth'

teacher2_model: 'ALLB'
teacher2_weight: 'ALLB-baby-Apr-24-2026-12-08-48.pth'

# ==========================================
# 蒸馏核心超参数 (Hinge + CE 动态蒸馏)
# ==========================================
temp: [0.2]          # Cross-Entropy 蒸馏的温度系数
alpha_hinge: [1.0]   # Hinge 蒸馏损失权重
beta_ce: [1.0]       # 动态加权的 CE 蒸馏损失权重

# ==========================================
# 对抗扰动与强化学习(RL) Agent 参数
# ==========================================
adv_lr: [0.001]      # 扰动参数 Phi 的梯度上升步长 (内层更新步长)
phi_limit: 0.5       # 扰动参数的截断范围 [-0.5, 0.5]
perturb_dropout: 0.5 # 采样候选扰动子图 T 时的随机丢弃率
rl_lr: [0.001]       # 【新增】RL 智能体策略网络的学习率

# ==========================================
# 学习与正则化
# ==========================================
learning_rate: [0.0001] # 模型参数 Theta 的优化学习率 (外层更新步长)
reg_weight: [0.001]
dropout: [0.1]

# ==========================================
# ALLB 内部对齐任务参数 (继承自原始 ALLB 任务)
# ==========================================
align_weight: [0.1]
use_global_align: True
use_local_align: True

# ==========================================
# 自动化调参任务列表
# ==========================================
hyper_parameters: ["reg_weight", "learning_rate", "adv_lr", "temp", "alpha_hinge", "beta_ce", "rl_lr"]