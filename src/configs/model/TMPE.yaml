# ========================== 基础 Embedding 维度 ==========================
embedding_size: 64         # 对应代码中的 dim_latent
feat_embed_dim: 64         # 多模态特征变换后的维度

# ========================== 图构建与传播参数 ==========================
knn_k: 10                  # KNN 物品图中每个节点的邻居数
mm_image_weight: 0.1       # 融合视觉(V)与文本(T)邻接矩阵时，视觉特征的权重
n_mm_layers: 1             # KNN 物品图上的传播层数 (buildItemGraph)
n_layers: 2                # 各模态 GCN (学生网络) 演化的层数
# ========================== 训练与正则化参数 ==========================
learning_rate: [0.0001]    # 学生网络及注意力融合模块的学习率
reg_weight: [1e-04]        # L2 正则化权重 (包含 ID 偏好和权重参数)
dropout: 0.2               # 丢弃率

# ========================== 知识蒸馏与对齐参数 ==========================
kd_weight: [0.1]           # 离线蒸馏损失 (MSE) 的权重，控制学生向教师学习的强度
align_weight: 0.01       # 虽为离线，但教师实例化时仍需此参数以保持结构一致
temp: 0.5                # 对比学习温度系数 (用于教师 B 的内部计算)

# ========================== 超参数搜索相关 ==========================
# 离线训练阶段主要调节学习率、正则化以及蒸馏权重 kd_weight
hyper_parameters: ["reg_weight", "learning_rate", "kd_weight"]